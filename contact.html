<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contact | Emmanuel Ndeke</title>
<link rel="stylesheet" href="style.css">
<nav class="navbar">

<a href="index.html">
<img src="images/logo.jpg" class="site-logo">
</a>

<div class="menu-toggle" id="menuToggle">☰</div>

<ul class="nav-links" id="navLinks">
<li><a href="index.html">Home</a></li>
<li><a href="projects.html">Projects</a></li>
<li><a href="contact.html">Contact</a></li>
</ul>

</nav>
<style>
.contact-section{
padding:80px 20px;
}

.contact-container{
max-width:1100px;
margin:auto;
background:rgba(0,0,0,0.65);
padding:50px;
border-radius:12px;
}

.contact-container h1{
text-align:center;
margin-bottom:10px;
}

.contact-intro{
text-align:center;
margin-bottom:40px;
color:#ddd;
}

.contact-grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:40px;
}

.contact-info h2{
color:#ff6600;
margin-top:20px;
}

.contact-form{
display:flex;
flex-direction:column;
gap:15px;
}

.contact-form input,
.contact-form textarea{
padding:12px;
border:none;
border-radius:6px;
font-size:15px;
}

.contact-form button{
background:#ff6600;
color:white;
border:none;
padding:12px;
border-radius:6px;
font-size:16px;
cursor:pointer;
transition:0.3s;
}

.contact-form button:hover{
background:#ff8533;
}
@media (max-width:768px){

.contact-container{
padding:30px 20px;
}

.contact-grid{
grid-template-columns:1fr;
gap:30px;
}

.contact-container h1{
font-size:28px;
}

.contact-form input,
.contact-form textarea{
font-size:14px;
}

}
</style>
</head>

<body>

<section class="contact-section">

<div class="contact-container">

<h1>Contact Emmanuel Ndeke</h1>

<p class="contact-intro">
Interested in collaboration, environmental research, or GIS mapping projects?
Feel free to reach out.
</p>

<div class="contact-grid">

<div class="contact-info">

<h2>Email</h2>
<p>emmanuelndeke2024@gmail.com</p>

<h2>Location</h2>
<p>Kenya</p>

<h2>Focus Areas</h2>
<p>GIS • Environmental Mapping • Climate Analysis</p>

</div>

<form class="contact-form">

<input type="text" placeholder="Your Name" required>

<input type="email" placeholder="Your Email" required>

<textarea placeholder="Your Message" rows="5" required></textarea>

<button type="submit">Send Message</button>

</form>

</div>

</div>

</section>
<script>
const toggle = document.getElementById("menuToggle");
const nav = document.getElementById("navLinks");

toggle.addEventListener("click", function(){
nav.classList.toggle("show");
});
</script>

</body>
</html>
