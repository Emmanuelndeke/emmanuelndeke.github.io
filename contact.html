<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contact | Emmanuel Ndeke</title>
<link rel="stylesheet" href="style.css">

</head>

<body>
<nav class="navbar">

<a href="index.html">
<img src="images/logo.jpg" class="site-logo">
</a>

<div class="menu-toggle" id="menuToggle">☰</div>

<ul class="nav-links" id="navLinks">
<li><a href="index.html">Home</a></li>
<li><a href="projects.html">Projects</a></li>
<li><a href="contact.html">Contact</a></li>
</ul>

</nav>

<section class="contact-section">

<div class="contact-container">

<h1>Contact Emmanuel Ndeke</h1>

<p class="contact-intro">
Interested in collaboration, environmental research, or GIS mapping projects?
Feel free to reach out.
</p>

<div class="contact-grid">

<div class="contact-info">

<h2>Email</h2>
<p>emmanuelndeke2024@gmail.com</p>

<h2>Location</h2>
<p>Kenya</p>

<h2>Focus Areas</h2>
<p>GIS • Environmental Mapping • Climate Analysis</p>

</div>

<form class="contact-form" action= "https://formspree.io/f/mdaykzzp" method="POST">

<input type="text" name="name" placeholder="Your Name" required>

<input type="email" name="email" placeholder="Your Email" required>

<textarea name="message" placeholder="Your Message" rows="5" required></textarea>

<button type="submit">Send Message</button>

</form>

</div>

</div>

</section>
<script>

const toggle = document.getElementById("menuToggle");
const nav = document.getElementById("navLinks");

toggle.addEventListener("click", function(e){
e.stopPropagation();
nav.classList.toggle("show");
});

document.addEventListener("click", function(e){
if(!nav.contains(e.target) && !toggle.contains(e.target)){
nav.classList.remove("show");
}
});

</script>

</body>
</html>
