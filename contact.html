<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contact | Emmanuel Ndeke</title>
<link rel="stylesheet" href="style.css">

<style>

.contact-container h1{
text-align:center;
margin-bottom:10px;
}

.contact-intro{
text-align:center;
margin-bottom:40px;
color:#ddd;
}

.contact-grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:40px;
}

.contact-info h2{
color:#ff6600;
margin-top:20px;
}

.contact-form{
display:flex;
flex-direction:column;
gap:15px;
}

.contact-form input,
.contact-form textarea{
padding:12px;
border:none;
border-radius:6px;
font-size:15px;
}

.contact-form button{
background:#ff6600;
color:white;
border:none;
padding:12px;
border-radius:6px;
font-size:16px;
cursor:pointer;
transition:0.3s;
}

.contact-form button:hover{
background:#ff8533;
}
.contact-section{
padding:40px 20px;
display:flex;
justify-content:center;
align-items:center;
min-height:80vh;
}

.contact-container{
max-width:1000px;
width:100%;
background:rgba(6,20,35,0.75);
padding:40px;
border-radius:10px;
}

.contact-container h1{
text-align:center;
margin-bottom:10px;
}

.contact-intro{
text-align:center;
margin-bottom:40px;
color:#ddd;
}

.contact-grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:40px;
}

.contact-info h2{
color:#3cff7a;
margin-top:20px;
}

.contact-form{
display:flex;
flex-direction:column;
gap:15px;
}

.contact-form input,
.contact-form textarea{
padding:12px;
border:none;
border-radius:6px;
font-size:15px;
}

.contact-form button{
background:#3cff7a;
color:#021018;
border:none;
padding:12px;
border-radius:6px;
font-size:16px;
cursor:pointer;
}

.contact-form button:hover{
opacity:0.85;
}
@media (max-width:768px){

.contact-container{
padding:25px;
}

.contact-grid{
grid-template-columns:1fr;
gap:30px;
}

.contact-container h1{
font-size:26px;
}

.contact-form input,
.contact-form textarea{
font-size:14px;
}
.contact-section{
min-height:70vh;
align-items:center;
}
@media (max-width:768px){

.menu-toggle{
display:block;
}

.nav-links{
display:none;
flex-direction:column;
position:absolute;
top:70px;
right:20px;
background:#021018;
padding:20px;
border-radius:8px;
}

.nav-links.show{
display:flex;
}

}
}
*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:Arial, sans-serif;
background:#0b1d2a;
color:white;
}
.navbar{
display:flex;
justify-content:space-between;
align-items:center;
padding:15px 40px;
background:#021018;
position:sticky;
top:0;
z-index:1000;
}

.nav-links{
list-style:none;
display:flex;
gap:30px;
}

.nav-links a{
text-decoration:none;
color:white;
font-weight:500;
}

.site-logo{
height:45px;
}
.menu-toggle{
display:none;
font-size:28px;
cursor:pointer;
color:white;
}
</style>
</head>

<body>
<nav class="navbar">

<a href="index.html">
<img src="images/logo.jpg" class="site-logo">
</a>

<div class="menu-toggle" id="menuToggle">☰</div>

<ul class="nav-links" id="navLinks">
<li><a href="index.html">Home</a></li>
<li><a href="projects.html">Projects</a></li>
<li><a href="contact.html">Contact</a></li>
</ul>

</nav>

<section class="contact-section">

<div class="contact-container">

<h1>Contact Emmanuel Ndeke</h1>

<p class="contact-intro">
Interested in collaboration, environmental research, or GIS mapping projects?
Feel free to reach out.
</p>

<div class="contact-grid">

<div class="contact-info">

<h2>Email</h2>
<p>emmanuelndeke2024@gmail.com</p>

<h2>Location</h2>
<p>Kenya</p>

<h2>Focus Areas</h2>
<p>GIS • Environmental Mapping • Climate Analysis</p>

</div>

<form class="contact-form">

<input type="text" placeholder="Your Name" required>

<input type="email" placeholder="Your Email" required>

<textarea placeholder="Your Message" rows="5" required></textarea>

<button type="submit">Send Message</button>

</form>

</div>

</div>

</section>
<script>
const toggle = document.getElementById("menuToggle");
const nav = document.getElementById("navLinks");

toggle.addEventListener("click", function(){
nav.classList.toggle("show");
});
</script>

</body>
</html>
